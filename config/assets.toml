[settings]
base_url = "https://api.binance.com"
max_requests_per_run = 80
repair_lookback_days = 3
backfill_calls_per_pair = 2
request_limit = 1000
base_interval = "1m"

symbols = [
  "BTCUSDT",
  "ETHUSDT",
  "XLMUSDT",
  "SOLUSDT",
  "SENTUSDT",
  "ZECUSDT",
  "XRPUSDT",
  "BNBUSDT",
  "TRXUSDT",
  "SPCXBUSDT",
]

derived_intervals = [
  "5m",
  "10m",
  "30m",
  "1h",
  "1d",
  "1w",
  "1mo",
  "1yr",
]
