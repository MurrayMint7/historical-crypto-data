name: Update crypto data

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-crypto-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: pip install -e .

      - name: Update data
        run: crypto-data update --max-requests 80

      - name: Commit changes
        run: |
          git config user.name "Josh Murray"
          git config user.email "joshuaamurray22@gmail.com"
          git add data metadata
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update crypto market data"
            git push
          fi
